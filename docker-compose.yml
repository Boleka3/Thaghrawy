services:
  dvwa:
    image: vulnerables/web-dvwa
    ports:
      - "8080:80"

  juice-shop:
    image: bkimminich/juice-shop
    ports:
      - "3000:3000"

  agent:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Docker-specific overrides — take priority over env_file values
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - TARGET=http://dvwa:80
      - JUICESHOP_TARGET=http://juice-shop:3000
    volumes:
      - chroma_data:/app/chroma_db
      - engagement_data:/app/engagements/sessions
      - hf_cache:/root/.cache/huggingface
      - ./reports:/app/reports
    depends_on:
      - dvwa
      - juice-shop

volumes:
  chroma_data:
  engagement_data:
  hf_cache:
