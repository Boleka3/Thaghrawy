services:
  # Optional practice targets — NOT started by default. They exist only for
  # exercising the agent against known-vulnerable apps. Bring them up with:
  #   docker compose --profile targets up
  # Users deploying the Thaghrawy harness against their own scope don't need them.
  dvwa:
    image: vulnerables/web-dvwa
    profiles: ["targets"]
    ports:
      - "8080:80"

  juice-shop:
    image: bkimminich/juice-shop
    profiles: ["targets"]
    ports:
      - "3000:3000"

  agent:
    build:
      context: .
      args:
        # cpu (default) | cuda (NVIDIA) | rocm (AMD). Override via the gpu compose files
        # or `COMPUTE_BACKEND=cuda docker compose build`.
        COMPUTE_BACKEND: ${COMPUTE_BACKEND:-cpu}
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Docker-specific overrides — take priority over env_file values
      - CHROMA_PERSIST_DIR=/app/chroma_db
      # When the practice targets are running (`--profile targets`), the agent
      # reaches them by service name — set TARGET per engagement, or in .env, e.g.
      #   TARGET=http://dvwa:80   /   JUICESHOP_TARGET=http://juice-shop:3000
    volumes:
      - chroma_data:/app/chroma_db
      - engagement_data:/app/engagements/sessions
      - hf_cache:/root/.cache/huggingface
      - ./reports:/app/reports
    # No depends_on: the harness runs standalone. The practice targets are an
    # opt-in profile (above), not a dependency.
    # Reach services on the Docker host (e.g. an LM Studio / Ollama LLM running on this
    # machine) by a stable name regardless of the host's LAN IP. Then set, in .env:
    #   OPENAI_BASE_URL=http://host.docker.internal:1234/v1   (LM Studio)
    #   OLLAMA_BASE_URL=http://host.docker.internal:11434     (Ollama)
    # Cloud LLM APIs and external targets need nothing here — the container already has
    # outbound internet egress via the default bridge. Requires Docker Engine >= 20.10.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Uncomment if a hardened host strips default caps and raw-socket scans
    # (nmap -sS, masscan) fail with "operation not permitted":
    # cap_add: [NET_RAW, NET_ADMIN]
    #
    # Alternative to bridge networking (Linux only): share the host network namespace —
    # reaches host-local LLMs via localhost and simplifies external scanning, but DISABLES
    # compose service-name DNS (dvwa/juice-shop) and port mapping. Do not combine with the
    # ports:/extra_hosts above.
    # network_mode: host

volumes:
  chroma_data:
  engagement_data:
  hf_cache:
