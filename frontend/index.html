<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thaghrawy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css?v=7" />
</head>
<body>
<div class="app">
  <header class="topbar">
    <span class="brand">THAG<span class="brand-accent">HRAWY</span></span>
    <span id="engagement-label" class="engagement-label">no engagement selected</span>
  </header>

  <main class="panels">
    <section class="panel panel-engagements">
      <h2>ENGAGEMENTS</h2>
      <div class="new-engagement">
        <input id="new-engagement-name" placeholder="name" />
        <input id="new-engagement-target" placeholder="target" />
        <select id="new-engagement-mode">
          <option value="full_analysis">Full Analysis</option>
          <option value="recon_only">Recon Only</option>
        </select>
        <button id="new-engagement-btn">[+] NEW</button>
      </div>
      <div class="section-label">ACTIVE</div>
      <ul id="active-engagements" class="engagement-list"></ul>
      <div class="section-label">PAST</div>
      <ul id="past-engagements" class="engagement-list"></ul>
    </section>

    <section class="panel panel-chat">
      <h2>AGENT CHAT</h2>
      <div id="phase-banner" class="phase-banner">PHASE: —</div>
      <div class="chat-controls">
        <button id="enumerate-btn" title="Run the autonomous enumeration sweep">&#9654; Enumerate</button>
        <button id="stop-btn" title="Halt the current turn">&#9632; Stop</button>
        <button id="run-tool-btn" title="Run a tool yourself">&#9881; Run tool</button>
        <button id="report-btn" title="Generate both reports">&#128196; Report</button>
        <button id="help-btn" title="List slash commands">? Help</button>
      </div>
      <div id="run-tool-form" class="run-tool-form hidden">
        <input id="run-tool-name" autocomplete="off" placeholder="tool (e.g. nuclei_scan)" />
        <input id="run-tool-args" autocomplete="off" placeholder='args JSON e.g. {"target":"http://x"}' />
        <button id="run-tool-go">run</button>
      </div>
      <div id="chat-log" class="chat-log"></div>
      <div class="chat-input-row">
        <span class="prompt-caret">&gt;</span>
        <input id="chat-input" autocomplete="off" placeholder="ask the agent, or /help ..." />
      </div>
    </section>

    <section class="panel panel-findings">
      <h2>FINDINGS</h2>
      <ul id="findings-list" class="findings-list"></ul>
      <button id="add-finding-btn">[+] Add Finding</button>

      <div class="section-label">REPORTS</div>
      <ul id="reports-list" class="reports-list"></ul>
      <button id="generate-reports-btn">[+] Generate Reports</button>
    </section>
  </main>

  <footer class="statusbar">
    <span id="llm-status" class="conn-status">LLM: checking...</span>
    <span id="conn-status" class="conn-status conn-disconnected">No engagement</span>
  </footer>
</div>

<script src="/static/app.js?v=7"></script>
</body>
</html>
